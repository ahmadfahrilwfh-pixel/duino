<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Embedded Simulator - Asset & Workbench</title>
    <style>
        :root { --bg: #1e1e2e; --panel: #252538; --text: #cdd6f4; --accent: #74c7ec; }
        body { font-family: 'Segoe UI', Tahoma, sans-serif; margin: 0; padding: 20px; background: var(--bg); color: var(--text); display: flex; gap: 20px; height: 90vh; overflow: hidden; }
        .panel { flex: 1; background: var(--panel); border-radius: 8px; padding: 20px; display: flex; flex-direction: column; border: 1px solid #313244; }
        
        #editor-container { flex: 1; border-radius: 6px; overflow: hidden; border: 1px solid #313244; margin-bottom: 15px; }
        
        .controls { display: flex; gap: 10px; margin-bottom: 15px; flex-wrap: wrap; }
        button { background: var(--accent); color: #11111b; border: none; padding: 8px 12px; border-radius: 4px; font-weight: bold; cursor: pointer; transition: 0.2s; font-size: 12px; }
        button:hover { opacity: 0.8; }
        .btn-save { background-color: #a6e3a1; }
        .btn-load { background-color: #f9e2af; }
        .btn-add { background-color: #cba6f7; color: #11111b; }
        
        /* Area Meja Kerja (Workbench) */
        #workbench {
            flex: 1;
            background-color: #181825;
            border: 2px dashed #45475a;
            border-radius: 8px;
            position: relative; /* Penting untuk drag & drop */
            overflow: hidden;
        }

        /* Class untuk komponen yang bisa digeser */
        .draggable {
            position: absolute;
            cursor: grab;
            user-select: none; /* Mencegah teks terblokir saat menggeser */
        }
        .draggable:active {
            cursor: grabbing;
        }

        /* Mengatur ukuran standar komponen Wokwi */
        wokwi-led { width: 30px; height: 30px; }
        wokwi-resistor { width: 40px; }
        wokwi-pushbutton { width: 30px; height: 30px; }
        
    </style>
    
    <script type="module" src="https://esm.run/@wokwi/elements"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/monaco-editor/0.44.0/min/vs/loader.min.js"></script>
</head>
<body>

    <div class="panel">
        <h3>Code Editor (C++)</h3>
        <div class="controls">
            <button id="btn-save" class="btn-save">💾 SIMPAN</button>
            <button id="btn-load" class="btn-load">📂 MUAT</button>
            <button id="btn-action">▶ KOMPILASI</button>
        </div>
        <div id="editor-container"></div>
    </div>

    <div class="panel">
        <h3>Meja Kerja Hardware</h3>
        
        <div class="controls" style="background: #1e1e2e; padding: 10px; border-radius: 6px;">
            <span style="font-size: 14px; margin-right: 10px; align-self: center;">Tambahkan Aset: </span>
            <button class="btn-add" onclick="addComponent('wokwi-led')">+ LED Merah</button>
            <button class="btn-add" onclick="addComponent('wokwi-resistor')">+ Resistor</button>
            <button class="btn-add" onclick="addComponent('wokwi-pushbutton')">+ Push Button</button>
        </div>

        <div id="workbench">
            <wokwi-arduino-uno id="uno-board" class="draggable" style="top: 50px; left: 50px;"></wokwi-arduino-uno>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getFirestore, doc, setDoc, getDoc } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBmZR9PeOQIdHBwV5USTxU3_41KfIbw9tQ",
            authDomain: "kwtabiyoso.firebaseapp.com",
            databaseURL: "https://kwtabiyoso-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "kwtabiyoso",
            storageBucket: "kwtabiyoso.firebasestorage.app",
            messagingSenderId: "1074176217961",
            appId: "1:1074176217961:web:1ffea7385504149f5da3f8",
            measurementId: "G-BMC8S9KX3D"
        };
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const docRef = doc(db, "projects", "sim_user_01"); 

        const btnSave = document.getElementById('btn-save');
        const btnLoad = document.getElementById('btn-load');
        const btnAction = document.getElementById('btn-action');

        // ==========================================
        // INISIALISASI MONACO EDITOR
        // ==========================================
        let monacoEditorInstance = null;
        const defaultCode = `void setup() {\n  pinMode(13, OUTPUT);\n}\n\nvoid loop() {\n  digitalWrite(13, HIGH);\n  delay(1000);\n  digitalWrite(13, LOW);\n  delay(1000);\n}`;

        require.config({ paths: { 'vs': 'https://cdnjs.cloudflare.com/ajax/libs/monaco-editor/0.44.0/min/vs' }});
        require(['vs/editor/editor.main'], function() {
            monacoEditorInstance = monaco.editor.create(document.getElementById('editor-container'), {
                value: defaultCode,
                language: 'cpp',
                theme: 'vs-dark',
                automaticLayout: true,
                minimap: { enabled: false },
                fontSize: 14
            });
        });

        // ==========================================
        // SISTEM DRAG & DROP KOMPONEN
        // ==========================================
        const workbench = document.getElementById('workbench');

        // Fungsi utama untuk menambahkan komponen ke meja kerja
        window.addComponent = function(type) {
            const newElement = document.createElement(type);
            newElement.classList.add('draggable');
            
            // Posisi awal saat komponen dipanggil (di tengah atas)
            newElement.style.top = '20px';
            newElement.style.left = '200px';

            // Konfigurasi khusus untuk elemen tertentu
            if(type === 'wokwi-led') {
                newElement.setAttribute('color', 'red');
            }

            workbench.appendChild(newElement);
            makeElementDraggable(newElement);
        };

        // Fungsi logika pergeseran mouse
        function makeElementDraggable(elmnt) {
            let pos1 = 0, pos2 = 0, pos3 = 0, pos4 = 0;
            elmnt.onmousedown = dragMouseDown;

            function dragMouseDown(e) {
                e.preventDefault();
                pos3 = e.clientX;
                pos4 = e.clientY;
                document.onmouseup = closeDragElement;
                document.onmousemove = elementDrag;
                
                // Bawa elemen yang sedang di-drag ke lapisan paling depan
                const allDraggables = document.querySelectorAll('.draggable');
                allDraggables.forEach(el => el.style.zIndex = "1");
                elmnt.style.zIndex = "10";
            }

            function elementDrag(e) {
                e.preventDefault();
                // Kalkulasi pergeseran kursor
                pos1 = pos3 - e.clientX;
                pos2 = pos4 - e.clientY;
                pos3 = e.clientX;
                pos4 = e.clientY;
                // Tetapkan posisi baru
                elmnt.style.top = (elmnt.offsetTop - pos2) + "px";
                elmnt.style.left = (elmnt.offsetLeft - pos1) + "px";
            }

            function closeDragElement() {
                // Hentikan pergeseran saat klik mouse dilepas
                document.onmouseup = null;
                document.onmousemove = null;
            }
        }

        // Aktifkan drag untuk Arduino bawaan saat halaman pertama dimuat
        makeElementDraggable(document.getElementById('uno-board'));


        // ==========================================
        // LOGIKA FIRESTORE
        // ==========================================
        btnSave.addEventListener('click', async () => {
            if (!monacoEditorInstance) return;
            try {
                btnSave.innerText = "⏳...";
                await setDoc(docRef, { code: monacoEditorInstance.getValue(), updatedAt: new Date() });
                alert("Tersimpan!");
            } catch (e) { alert("Gagal: " + e.message); } 
            finally { btnSave.innerText = "💾 SIMPAN"; }
        });

        btnLoad.addEventListener('click', async () => {
            if (!monacoEditorInstance) return;
            try {
                btnLoad.innerText = "⏳...";
                const docSnap = await getDoc(docRef);
                if (docSnap.exists()) { monacoEditorInstance.setValue(docSnap.data().code); } 
                else { alert("Belum ada data."); }
            } catch (e) { alert("Gagal: " + e.message); } 
            finally { btnLoad.innerText = "📂 MUAT"; }
        });

        btnAction.addEventListener('click', () => {
            alert("Sistem UI Meja Kerja selesai! Langkah berikutnya adalah Kompilator WASM.");
        });

    </script>
</body>
</html>
