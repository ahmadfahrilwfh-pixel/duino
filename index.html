<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Embedded Simulator - Monaco Editor Edition</title>
    <style>
        :root { --bg: #1e1e2e; --panel: #252538; --text: #cdd6f4; --accent: #74c7ec; }
        body { font-family: 'Segoe UI', Tahoma, sans-serif; margin: 0; padding: 20px; background: var(--bg); color: var(--text); display: flex; gap: 20px; height: 90vh; }
        .panel { flex: 1; background: var(--panel); border-radius: 8px; padding: 20px; display: flex; flex-direction: column; border: 1px solid #313244; }
        
        /* Container untuk Monaco Editor */
        #editor-container { flex: 1; border-radius: 6px; overflow: hidden; border: 1px solid #313244; margin-bottom: 15px; }
        
        .controls { display: flex; gap: 10px; margin-bottom: 15px; flex-wrap: wrap; }
        button { background: var(--accent); color: #11111b; border: none; padding: 10px 15px; border-radius: 4px; font-weight: bold; cursor: pointer; transition: 0.2s; }
        button:hover { opacity: 0.8; }
        .btn-save { background-color: #a6e3a1; }
        .btn-load { background-color: #f9e2af; }
        .btn-stop { background-color: #f38ba8; }
        
        #uno-board { margin: auto; }
    </style>
    
    <script type="module" src="https://esm.run/@wokwi/elements"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/monaco-editor/0.44.0/min/vs/loader.min.js"></script>
</head>
<body>

    <div class="panel">
        <h3>Code Editor (C++)</h3>
        <div class="controls">
            <button id="btn-save" class="btn-save">💾 SIMPAN KE FIRESTORE</button>
            <button id="btn-load" class="btn-load">📂 MUAT DARI FIRESTORE</button>
        </div>
        
        <div id="editor-container"></div>
    </div>

    <div class="panel">
        <h3>Simulasi Hardware</h3>
        <div class="controls">
            <button id="btn-action">▶ KOMPILASI & JALANKAN</button>
        </div>
        <div style="flex:1; display:flex; align-items:center; justify-content:center; flex-direction:column;">
            <wokwi-arduino-uno id="uno-board"></wokwi-arduino-uno>
            <p style="margin-top:20px;">Status PIN 13: <strong id="status-val">LOW</strong></p>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getFirestore, doc, setDoc, getDoc } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBmZR9PeOQIdHBwV5USTxU3_41KfIbw9tQ",
            authDomain: "kwtabiyoso.firebaseapp.com",
            databaseURL: "https://kwtabiyoso-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "kwtabiyoso",
            storageBucket: "kwtabiyoso.firebasestorage.app",
            messagingSenderId: "1074176217961",
            appId: "1:1074176217961:web:1ffea7385504149f5da3f8",
            measurementId: "G-BMC8S9KX3D"
        };
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const docRef = doc(db, "projects", "sim_user_01"); 

        const btnSave = document.getElementById('btn-save');
        const btnLoad = document.getElementById('btn-load');
        const btnAction = document.getElementById('btn-action');

        // ==========================================
        // INISIALISASI MONACO EDITOR
        // ==========================================
        let monacoEditorInstance = null;
        
        // Template bawaan Arduino
        const defaultCode = `void setup() {
  // Letakkan kode setup di sini, berjalan sekali:
  pinMode(13, OUTPUT);
}

void loop() {
  // Letakkan kode utama di sini, berjalan berulang-ulang:
  digitalWrite(13, HIGH);
  delay(1000);
  digitalWrite(13, LOW);
  delay(1000);
}`;

        // Konfigurasi jalur CDN Monaco
        require.config({ paths: { 'vs': 'https://cdnjs.cloudflare.com/ajax/libs/monaco-editor/0.44.0/min/vs' }});
        require(['vs/editor/editor.main'], function() {
            monacoEditorInstance = monaco.editor.create(document.getElementById('editor-container'), {
                value: defaultCode,
                language: 'cpp', // Set bahasa ke C++ untuk syntax highlighting & auto-complete
                theme: 'vs-dark', // Tema gelap ala VS Code
                automaticLayout: true,
                minimap: { enabled: false }, // Mematikan peta kode di sebelah kanan agar tidak sempit
                fontSize: 14
            });
        });

        // ==========================================
        // LOGIKA FIRESTORE (Disinkronkan dengan Monaco)
        // ==========================================
        btnSave.addEventListener('click', async () => {
            if (!monacoEditorInstance) return;
            try {
                btnSave.innerText = "⏳ Menyimpan...";
                
                // Mengambil nilai C++ dari Monaco Editor
                const currentCode = monacoEditorInstance.getValue(); 
                
                await setDoc(docRef, {
                    code: currentCode,
                    updatedAt: new Date()
                });
                alert("Kode C++ berhasil disimpan ke Firestore!");
            } catch (e) {
                alert("Gagal menyimpan: " + e.message);
            } finally {
                btnSave.innerText = "💾 SIMPAN KE FIRESTORE";
            }
        });

        btnLoad.addEventListener('click', async () => {
            if (!monacoEditorInstance) return;
            try {
                btnLoad.innerText = "⏳ Memuat...";
                const docSnap = await getDoc(docRef);
                if (docSnap.exists()) {
                    
                    // Memasukkan nilai C++ dari Firestore ke Monaco Editor
                    monacoEditorInstance.setValue(docSnap.data().code); 
                    alert("Kode C++ berhasil dimuat dari Firestore!");
                } else {
                    alert("Belum ada data tersimpan di Firestore.");
                }
            } catch (e) {
                alert("Gagal memuat: " + e.message);
            } finally {
                btnLoad.innerText = "📂 MUAT DARI FIRESTORE";
            }
        });

        // ==========================================
        // LOGIKA TOMBOL JALANKAN
        // ==========================================
        btnAction.addEventListener('click', () => {
            // Peringatan karena kita sekarang menggunakan C++, bukan HEX
            alert("Tampilan UI sudah sempurna! Namun, karena kita mengetik dalam bahasa C++, kode ini harus dikompilasi menjadi .hex terlebih dahulu sebelum bisa masuk ke papan Arduino.\n\nLangkah selanjutnya adalah memasang Compiler WebAssembly (WASM).");
        });

    </script>
</body>
</html>
