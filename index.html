<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Embedded Simulator - Wokwi Clone</title>
    <style>
        :root { --bg: #1e1e2e; --panel: #252538; --text: #cdd6f4; --accent: #74c7ec; --log-bg: #11111b; }
        body { font-family: 'Segoe UI', Tahoma, sans-serif; margin: 0; padding: 0; background: var(--bg); color: var(--text); display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
        
        /* Navbar & Panels */
        .navbar { background: var(--panel); padding: 10px 20px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #313244; z-index: 100;}
        .view-toggles button { background: #313244; color: var(--text); border: none; padding: 6px 12px; margin: 0 5px; border-radius: 4px; cursor: pointer; transition: 0.2s;}
        .view-toggles button.active { background: var(--accent); color: #11111b; font-weight: bold;}
        
        .main-container { display: flex; flex: 1; overflow: hidden; padding: 15px; gap: 15px; }
        .panel { background: var(--panel); border-radius: 8px; display: flex; flex-direction: column; border: 1px solid #313244; flex: 1; transition: 0.3s; overflow: hidden; }
        
        /* Code Panel Specifics */
        #panel-code { padding: 15px; }
        #editor-container { flex: 3; border-radius: 6px; overflow: hidden; border: 1px solid #313244; margin-bottom: 10px; }
        #log-container { flex: 1; background: var(--log-bg); border-radius: 6px; border: 1px solid #313244; padding: 10px; font-family: monospace; font-size: 12px; color: #a6e3a1; overflow-y: auto; white-space: pre-wrap; display: flex; flex-direction: column;}
        
        .controls { display: flex; gap: 10px; margin-bottom: 15px; flex-wrap: wrap; }
        .btn-top { background: #313244; color: var(--text); border: none; padding: 8px 12px; border-radius: 4px; font-weight: bold; cursor: pointer; transition: 0.2s; font-size: 12px; }
        .btn-top:hover { background: #45475a; }
        
        /* Simulation Panel Specifics (Like Video) */
        .sim-header { background: #181825; padding: 8px 15px; display: flex; align-items: center; border-bottom: 1px solid #313244; gap: 10px; }
        .sim-title { font-weight: bold; margin-right: 20px; }
        .btn-play { background: #10b981; color: white; border: none; border-radius: 50%; width: 35px; height: 35px; display: flex; align-items: center; justify-content: center; cursor: pointer; font-size: 16px; transition: 0.2s;}
        .btn-play:hover { background: #059669; transform: scale(1.05); }
        .btn-play.running { background: #ef4444; }
        .btn-add { background: #3b82f6; color: white; border: none; border-radius: 50%; width: 35px; height: 35px; display: flex; align-items: center; justify-content: center; cursor: pointer; font-size: 20px; transition: 0.2s; }
        .btn-add:hover { background: #2563eb; transform: scale(1.05); }
        .btn-more { background: #313244; color: white; border: none; border-radius: 50%; width: 35px; height: 35px; cursor: pointer; font-weight:bold; }
        
        #workbench { flex: 1; background-color: #1e1e2e; position: relative; overflow: hidden; cursor: default; }

        .draggable { position: absolute; cursor: grab; user-select: none; z-index: 10;}
        .draggable:active { cursor: grabbing; }

        /* Wiring Layer */
        #wiring-layer { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 5; }
        .wire { stroke: #22c55e; stroke-width: 4; stroke-linecap: round; stroke-linejoin: round; transition: stroke 0.2s, filter 0.2s; }
        .wire.drawing { opacity: 0.7; stroke-dasharray: 6,4;}
        .wire.high-voltage { stroke: #ef4444 !important; filter: drop-shadow(0px 0px 8px #ef4444) !important; }

        /* Modal Menu Asset */
        .modal-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); z-index: 200; justify-content: center; align-items: center; }
        .modal-content { background: var(--panel); border: 1px solid #313244; border-radius: 8px; width: 350px; max-height: 80vh; overflow-y: auto; box-shadow: 0 10px 30px rgba(0,0,0,0.8); }
        .modal-header { padding: 15px; border-bottom: 1px solid #313244; display: flex; justify-content: space-between; align-items: center; font-weight: bold;}
        .close-modal { background: none; border: none; color: #f38ba8; font-size: 20px; cursor: pointer; padding: 0;}
        .asset-list { list-style: none; padding: 0; margin: 0; }
        .asset-item { padding: 15px; border-bottom: 1px solid #313244; display: flex; align-items: center; gap: 15px; cursor: pointer; transition: 0.2s; }
        .asset-item:hover { background: #313244; }
        
    </style>
    
    <script type="module" src="https://esm.run/@wokwi/elements"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/monaco-editor/0.44.0/min/vs/loader.min.js"></script>
</head>
<body>

    <div class="navbar">
        <h3 style="margin: 0; color: #cba6f7;">Wokwi Clone IDE</h3>
        <div class="view-toggles">
            <button id="view-code">Code Only</button>
            <button id="view-split" class="active">Split View</button>
            <button id="view-sim">Sim Only</button>
        </div>
    </div>

    <div class="main-container">
        <div class="panel" id="panel-code">
            <div class="controls">
                <button id="btn-save" class="btn-top">💾 Simpan Project</button>
            </div>
            <div id="editor-container"></div>
            <div id="log-container">
                <span style="color: #cdd6f4;">[System] IDE Siap. Hover ke pin komponen untuk menarik kabel. Klik area kosong untuk membuat belokan kabel.</span>
            </div>
        </div>

        <div class="panel" id="panel-sim">
            <div class="sim-header">
                <span class="sim-title">Simulation</span>
                <button id="btn-compile" class="btn-play" title="Kompilasi & Jalankan">▶</button>
                <button id="btn-add-asset" class="btn-add" title="Tambah Komponen">+</button>
                <button class="btn-more">⋮</button>
            </div>
            
            <div id="workbench">
                <svg id="wiring-layer"></svg>
                <wokwi-arduino-uno id="uno-board" class="draggable" style="top: 150px; left: 100px;"></wokwi-arduino-uno>
            </div>
        </div>
    </div>

    <div class="modal-overlay" id="asset-modal">
        <div class="modal-content">
            <div class="modal-header">
                <span>Pilih Komponen</span>
                <button class="close-modal" id="close-modal">&times;</button>
            </div>
            <ul class="asset-list">
                <li class="asset-item" onclick="addComponent('wokwi-led', {color: 'red', style: 'width:30px;'})">
                    <wokwi-led color="red" style="width:30px;"></wokwi-led> <span>LED Merah</span>
                </li>
                <li class="asset-item" onclick="addComponent('wokwi-lcd1602', {style: 'width:150px;'})">
                    <wokwi-lcd1602 style="width:100px;"></wokwi-lcd1602> <span>LCD 16x2</span>
                </li>
                <li class="asset-item" onclick="addComponent('wokwi-analog-joystick', {style: 'width:80px;'})">
                    <wokwi-analog-joystick style="width:50px;"></wokwi-analog-joystick> <span>Joystick</span>
                </li>
                <li class="asset-item" onclick="addComponent('wokwi-resistor', {value: 220, style: 'width:50px;'})">
                    <wokwi-resistor style="width:50px;"></wokwi-resistor> <span>Resistor</span>
                </li>
            </ul>
        </div>
    </div>

    <script type="module">
        import { CPU, AVRIOPort, portBConfig, portDConfig } from 'https://esm.run/avr8js';

        const logContainer = document.getElementById('log-container');
        function addLog(message, isError = false) {
            const span = document.createElement('span');
            span.style.color = isError ? '#f38ba8' : '#a6e3a1';
            span.innerText = `> ${message}`;
            logContainer.appendChild(span);
            logContainer.scrollTop = logContainer.scrollHeight;
        }

        // ==========================================
        // INISIALISASI MONACO EDITOR
        // ==========================================
        let monacoEditorInstance = null;
        const defaultCode = `void setup() {\n  pinMode(13, OUTPUT);\n}\n\nvoid loop() {\n  digitalWrite(13, HIGH);\n  delay(500);\n  digitalWrite(13, LOW);\n  delay(500);\n}`;

        require.config({ paths: { 'vs': 'https://cdnjs.cloudflare.com/ajax/libs/monaco-editor/0.44.0/min/vs' }});
        require(['vs/editor/editor.main'], function() {
            monacoEditorInstance = monaco.editor.create(document.getElementById('editor-container'), {
                value: defaultCode, language: 'cpp', theme: 'vs-dark', automaticLayout: true, minimap: { enabled: false }
            });
        });

        // VIEW TOGGLE
        const pnlCode = document.getElementById('panel-code');
        const pnlSim = document.getElementById('panel-sim');
        document.getElementById('view-code').onclick = (e) => setView('code', e.target);
        document.getElementById('view-split').onclick = (e) => setView('split', e.target);
        document.getElementById('view-sim').onclick = (e) => setView('sim', e.target);

        function setView(mode, btn) {
            document.querySelectorAll('.view-toggles button').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            if(mode === 'code') { pnlCode.style.display = 'flex'; pnlSim.style.display = 'none'; }
            else if(mode === 'sim') { pnlCode.style.display = 'none'; pnlSim.style.display = 'flex'; }
            else { pnlCode.style.display = 'flex'; pnlSim.style.display = 'flex'; }
        }

        // ==========================================
        // SISTEM DRAG & DROP KABEL (WIRING)
        // ==========================================
        const workbench = document.getElementById('workbench');
        const wiringLayer = document.getElementById('wiring-layer');
        
        const simulationState = { wires: [] };
        let wireCounter = 0;
        
        let wiringState = {
            active: false,
            wire: null // Objek kabel yang sedang ditarik
        };

        // Fungsi menggambar ulang path SVG berdasarkan koordinat komponen dan waypoint
        function renderWire(wireObj) {
            const fromX = wireObj.fromComp.offsetLeft + wireObj.fromOffset.x;
            const fromY = wireObj.fromComp.offsetTop + wireObj.fromOffset.y;
            
            let d = `M ${fromX} ${fromY}`;
            
            // Tambahkan belokan (waypoints)
            for (let pt of wireObj.waypoints) {
                d += ` L ${pt.x} ${pt.y}`;
            }

            // Tambahkan titik tujuan atau cursor
            if (wireObj.toComp) {
                const toX = wireObj.toComp.offsetLeft + wireObj.toOffset.x;
                const toY = wireObj.toComp.offsetTop + wireObj.toOffset.y;
                d += ` L ${toX} ${toY}`;
            } else {
                d += ` L ${wireObj.mouseX} ${wireObj.mouseY}`;
            }
            
            wireObj.svgElement.setAttribute('d', d);
        }

        function updateAllWires() {
            simulationState.wires.forEach(renderWire);
        }

        // Event mousedown utama di workbench
        workbench.addEventListener('mousedown', (e) => {
            if (e.button !== 0) return; // Abaikan klik kanan

            const path = e.composedPath();
            let clickedComp = null;
            let clickedPin = null;

            // Deteksi jika yang diklik adalah komponen & mencari ID pin di dalam Shadow DOM
            for (let i = 0; i < path.length; i++) {
                const el = path[i];
                if (el.classList && el.classList.contains('draggable')) {
                    clickedComp = el;
                }
                // Logika mendeteksi Pin: Elemen SVG 'g' yang memiliki ID (bukan struktur utama)
                if (el instanceof SVGElement && el.tagName === 'g' && el.id && !el.id.startsWith('comp-') && el.id !== 'uno-board') {
                    clickedPin = el.id;
                }
            }

            const workbenchRect = workbench.getBoundingClientRect();
            const mouseX = e.clientX - workbenchRect.left;
            const mouseY = e.clientY - workbenchRect.top;

            // KONDISI 1: KITA SEDANG MENARIK KABEL
            if (wiringState.active) {
                e.stopPropagation();
                
                if (clickedComp && clickedPin && (clickedComp !== wiringState.wire.fromComp || clickedPin !== wiringState.wire.fromPin)) {
                    // KLIK DI PIN TUJUAN: Selesaikan sambungan
                    const compRect = clickedComp.getBoundingClientRect();
                    wiringState.wire.toComp = clickedComp;
                    wiringState.wire.toPin = clickedPin;
                    wiringState.wire.toOffset = { x: e.clientX - compRect.left, y: e.clientY - compRect.top };
                    
                    wiringState.wire.svgElement.classList.remove('drawing');
                    simulationState.wires.push(wiringState.wire);
                    renderWire(wiringState.wire);
                    
                    addLog(`Tersambung: ${wiringState.wire.fromComp.tagName}(${wiringState.wire.fromPin}) ke ${clickedComp.tagName}(${clickedPin})`);
                    wiringState.active = false;
                    wiringState.wire = null;
                } else if (!clickedComp) {
                    // KLIK DI RUANG KOSONG: Buat belokan siku (Waypoint)
                    wiringState.wire.waypoints.push({ x: mouseX, y: mouseY });
                    renderWire(wiringState.wire);
                }
                return;
            }

            // KONDISI 2: KITA TIDAK MENARIK KABEL
            if (clickedComp && clickedPin) {
                // KLIK PADA PIN: Mulai menarik kabel baru
                e.stopPropagation();
                e.preventDefault();

                const compRect = clickedComp.getBoundingClientRect();
                
                const svgPath = document.createElementNS('http://www.w3.org/2000/svg', 'path');
                svgPath.classList.add('wire', 'drawing');
                svgPath.setAttribute('fill', 'none');
                wiringLayer.appendChild(svgPath);

                wiringState.active = true;
                wiringState.wire = {
                    id: `wire-${wireCounter++}`,
                    fromComp: clickedComp,
                    fromPin: clickedPin,
                    fromOffset: { x: e.clientX - compRect.left, y: e.clientY - compRect.top },
                    toComp: null,
                    toPin: null,
                    toOffset: null,
                    waypoints: [],
                    mouseX: mouseX,
                    mouseY: mouseY,
                    svgElement: svgPath
                };
                
                renderWire(wiringState.wire);
            } else if (clickedComp) {
                // KLIK PADA BODY KOMPONEN: Drag & Drop komponen
                startDragComponent(clickedComp, e);
            }
        });

        // Event mousemove: Memperbarui posisi ujung kabel
        window.addEventListener('mousemove', (e) => {
            if (wiringState.active && wiringState.wire) {
                const workbenchRect = workbench.getBoundingClientRect();
                wiringState.wire.mouseX = e.clientX - workbenchRect.left;
                wiringState.wire.mouseY = e.clientY - workbenchRect.top;
                renderWire(wiringState.wire);
            }
        });

        // Batal sambung kabel dengan klik kanan atau tombol Escape
        workbench.addEventListener('contextmenu', (e) => {
            if(wiringState.active) { e.preventDefault(); cancelWire(); }
        });
        window.addEventListener('keydown', (e) => {
            if(e.key === 'Escape' && wiringState.active) cancelWire();
        });

        function cancelWire() {
            if(wiringState.wire && wiringState.wire.svgElement) wiringLayer.removeChild(wiringState.wire.svgElement);
            wiringState.active = false;
            wiringState.wire = null;
            addLog("Kabel dibatalkan.");
        }

        // Logic Drag & Drop Komponen
        function startDragComponent(elmnt, e) {
            e.preventDefault();
            let pos3 = e.clientX, pos4 = e.clientY;
            
            document.onmouseup = () => { document.onmouseup = null; document.onmousemove = null; };
            document.onmousemove = (ev) => {
                ev.preventDefault();
                let pos1 = pos3 - ev.clientX;
                let pos2 = pos4 - ev.clientY;
                pos3 = ev.clientX;
                pos4 = ev.clientY;
                elmnt.style.top = (elmnt.offsetTop - pos2) + "px";
                elmnt.style.left = (elmnt.offsetLeft - pos1) + "px";
                updateAllWires(); // Kabel ikut bergerak otomatis
            };
            document.querySelectorAll('.draggable').forEach(el => el.style.zIndex = "10");
            elmnt.style.zIndex = "20"; 
        }

        // ==========================================
        // SISTEM MODAL TAMBAH KOMPONEN
        // ==========================================
        const modal = document.getElementById('asset-modal');
        document.getElementById('btn-add-asset').onclick = () => modal.style.display = 'flex';
        document.getElementById('close-modal').onclick = () => modal.style.display = 'none';
        let compCounter = 0;

        window.addComponent = function(type, attributes = {}) {
            const newElement = document.createElement(type);
            newElement.classList.add('draggable');
            newElement.id = `comp-${compCounter++}`;
            newElement.style.top = '100px';
            newElement.style.left = '250px';
            
            for (const [key, value] of Object.entries(attributes)) {
                newElement.setAttribute(key, value);
            }
            
            workbench.appendChild(newElement);
            modal.style.display = 'none';
        };

        // ==========================================
        // KOMPILASI C++ KE HEX & JALANKAN AVR8JS
        // ==========================================
        const btnCompile = document.getElementById('btn-compile');
        let runnerInterval = null;

        function parseHex(hex) {
            const data = new Uint8Array(32768);
            const lines = hex.split('\n');
            for (const line of lines) {
                if (line.startsWith(':')) {
                    const length = parseInt(line.substring(1, 3), 16);
                    const address = parseInt(line.substring(3, 7), 16);
                    const recordType = parseInt(line.substring(7, 9), 16);
                    if (recordType === 0) {
                        for (let i = 0; i < length; i++) { data[address + i] = parseInt(line.substring(9 + i * 2, 11), 16); }
                    }
                }
            }
            return data;
        }

        function triggerPinState(pinNumber, isHigh) {
            simulationState.wires.forEach(wire => {
                if (wire.fromComp.id === 'uno-board' && wire.fromPin === pinNumber.toString()) {
                    // Beri efek warna tegangan tinggi ke kabel
                    if (isHigh) wire.svgElement.classList.add('high-voltage');
                    else wire.svgElement.classList.remove('high-voltage');

                    // Teruskan data arus ke komponen
                    if (wire.toComp.tagName.toLowerCase() === 'wokwi-led') {
                        wire.toComp.value = isHigh;
                    }
                }
            });
        }

        btnCompile.addEventListener('click', async () => {
            if (!monacoEditorInstance) return;
            
            if (runnerInterval) {
                clearInterval(runnerInterval);
                runnerInterval = null;
                document.getElementById('uno-board').led13 = false;
                simulationState.wires.forEach(w => w.svgElement.classList.remove('high-voltage'));
                addLog("Simulasi Dihentikan.");
                btnCompile.innerText = "▶";
                btnCompile.classList.remove('running');
                return;
            }

            const code = monacoEditorInstance.getValue();
            addLog("Mengkompilasi kode...");
            
            const buildPayload = { 
                board: 'uno',
                sketch: 'sketch.ino',
                files: { "sketch.ino": code }
            };
            
            try {
                const response = await fetch('https://hexi.wokwi.com/build', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(buildPayload)
                });
                
                const result = await response.json();
                if (result.stderr) { addLog("COMPILER ERROR:\n" + result.stderr, true); return; }

                addLog(`Berhasil. Memulai mesin Virtual...`);

                const program = new Uint16Array(32768);
                const programBytes = new Uint8Array(program.buffer);
                programBytes.set(parseHex(result.hex));
                
                const cpu = new CPU(program);
                const portB = new AVRIOPort(cpu, portBConfig); 
                
                portB.addListener((value) => {
                    const pin13High = (value & (1 << 5)) !== 0; 
                    document.getElementById('uno-board').led13 = pin13High;
                    triggerPinState(13, pin13High); 
                });

                runnerInterval = setInterval(() => {
                    const cyclesToRun = cpu.cycles + 16000000 / 60; 
                    while (cpu.cycles < cyclesToRun) { cpu.tick(); }
                }, 16);

                btnCompile.innerText = "⏹";
                btnCompile.classList.add('running');
                addLog("Simulasi Berjalan!");

            } catch (error) {
                addLog("Gagal menghubungi server kompilator.", true);
            }
        });
    </script>
</body>
</html>
