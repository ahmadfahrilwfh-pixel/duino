<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Embedded Simulator - Firestore & Wokwi UI</title>
    <style>
        :root { --bg: #1e1e2e; --panel: #252538; --text: #cdd6f4; --accent: #74c7ec; }
        body { font-family: 'Segoe UI', Tahoma, sans-serif; margin: 0; padding: 20px; background: var(--bg); color: var(--text); display: flex; gap: 20px; height: 90vh; }
        .panel { flex: 1; background: var(--panel); border-radius: 8px; padding: 20px; display: flex; flex-direction: column; border: 1px solid #313244; }
        textarea { flex: 1; background: #181825; color: #a6e3a1; border: 1px solid #313244; padding: 15px; font-family: monospace; border-radius: 6px; resize: none; outline: none; margin-bottom: 15px; }
        .controls { display: flex; gap: 10px; margin-bottom: 15px; flex-wrap: wrap; }
        button { background: var(--accent); color: #11111b; border: none; padding: 10px 15px; border-radius: 4px; font-weight: bold; cursor: pointer; transition: 0.2s; }
        button:hover { opacity: 0.8; }
        .btn-save { background-color: #a6e3a1; }
        .btn-load { background-color: #f9e2af; }
        .btn-stop { background-color: #f38ba8; }
        
        /* Mengatur posisi papan Arduino agar di tengah */
        #uno-board { margin: auto; }
    </style>
    
    <script type="module" src="https://esm.run/@wokwi/elements"></script>
</head>
<body>

    <div class="panel">
        <h3>Kode Hex & Database</h3>
        <div class="controls">
            <button id="btn-save" class="btn-save">💾 SIMPAN KE FIRESTORE</button>
            <button id="btn-load" class="btn-load">📂 MUAT DARI FIRESTORE</button>
        </div>
        <textarea id="hex-input" placeholder="Ketik kode di sini...">
:100000000C945A000C946E000C946E000C946E00B0
:100010000C946E000C946E000C946E000C946E00A0
:100020000C946E000C946E000C946E000C946E0090
:100030000C946E000C946E000C946E000C946E0080
:100040000C946E000C946E000C946E000C946E0070
:100050000C946E000C946E000C946E000C946E0060
:100060000C946E000C946E000C946E000C946E0050
:100070000C946E000C946E00E5CF0000000000004C
:10008000000000000000000000000000010000005E
:100090000000000000000000000000000000000056
:1000A000000000000000000025B000000000000039
:0200B000F89408
:0400B200000000004A
:1000C0000FEF24B7F89404E040B902C02096F0CD
:1000D00001C02196F4B7F894E2CF80E085BB80E1C9
:1000E00085BB0FC02197E1F7F894EFCF0895FA
:00000001FF</textarea>
    </div>

    <div class="panel">
        <h3>Simulasi Hardware</h3>
        <div class="controls">
            <button id="btn-action">▶ JALANKAN SIMULASI</button>
        </div>
        <div style="flex:1; display:flex; align-items:center; justify-content:center; flex-direction:column;">
            
            <wokwi-arduino-uno id="uno-board"></wokwi-arduino-uno>
            
            <p style="margin-top:20px;">Status PIN 13: <strong id="status-val">LOW</strong></p>
        </div>
    </div>

    <script type="module">
        // IMPORT FIREBASE 
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getFirestore, doc, setDoc, getDoc } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";
        
        // IMPORT SIMULATOR (Menggunakan link CDN agar tidak error Not Found)
        import { AVRRunner, hxToBin } from 'https://esm.run/avr8js';

        // ==========================================
        // KONFIGURASI FIRESTORE
        // ==========================================
const firebaseConfig = {
  apiKey: "AIzaSyBmZR9PeOQIdHBwV5USTxU3_41KfIbw9tQ",
  authDomain: "kwtabiyoso.firebaseapp.com",
  databaseURL: "https://kwtabiyoso-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "kwtabiyoso",
  storageBucket: "kwtabiyoso.firebasestorage.app",
  messagingSenderId: "1074176217961",
  appId: "1:1074176217961:web:1ffea7385504149f5da3f8",
  measurementId: "G-BMC8S9KX3D"
};
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const docRef = doc(db, "projects", "sim_user_01"); 

        // ELEMEN DOM
        const hexInput = document.getElementById('hex-input');
        const btnSave = document.getElementById('btn-save');
        const btnLoad = document.getElementById('btn-load');
        const btnAction = document.getElementById('btn-action');
        
        // 3. TARGETKAN PAPAN ARDUINO
        const unoBoard = document.getElementById('uno-board');
        const statusVal = document.getElementById('status-val');

        let runner = null;

        // ==========================================
        // LOGIKA FIRESTORE
        // ==========================================
        btnSave.addEventListener('click', async () => {
            try {
                btnSave.innerText = "⏳ Menyimpan...";
                await setDoc(docRef, {
                    code: hexInput.value,
                    updatedAt: new Date()
                });
                alert("Kode berhasil disimpan ke Firestore!");
            } catch (e) {
                alert("Gagal menyimpan. Pastikan Konfigurasi Firebase Benar! Error: " + e.message);
            } finally {
                btnSave.innerText = "💾 SIMPAN KE FIRESTORE";
            }
        });

        btnLoad.addEventListener('click', async () => {
            try {
                btnLoad.innerText = "⏳ Memuat...";
                const docSnap = await getDoc(docRef);
                if (docSnap.exists()) {
                    hexInput.value = docSnap.data().code;
                    alert("Kode berhasil dimuat dari Firestore!");
                } else {
                    alert("Belum ada data tersimpan di Firestore.");
                }
            } catch (e) {
                alert("Gagal memuat: " + e.message);
            } finally {
                btnLoad.innerText = "📂 MUAT DARI FIRESTORE";
            }
        });

        // ==========================================
        // LOGIKA SIMULATOR (AVR8JS + WOKWI)
        // ==========================================
        btnAction.addEventListener('click', () => {
            if (runner) {
                runner.stop();
                runner = null;
                btnAction.innerText = "▶ JALANKAN SIMULASI";
                btnAction.classList.remove('btn-stop');
                
                // 4. MATIKAN LAMPU L DI PAPAN ARDUINO SAAT STOP
                unoBoard.led13 = false;
                statusVal.innerText = "LOW";
                return;
            }

            try {
                const hexData = hexInput.value.trim();
                const binProgram = hxToBin(hexData);
                
                runner = new AVRRunner(binProgram);
                
                runner.portB.addListener((value) => {
                    const pinState = (value & 0x20) !== 0; 
                    if (pinState) {
                        // 5. NYALAKAN LAMPU L DI PAPAN ARDUINO
                        unoBoard.led13 = true;
                        statusVal.innerText = "HIGH";
                    } else {
                        unoBoard.led13 = false;
                        statusVal.innerText = "LOW";
                    }
                });

                runner.start();
                btnAction.innerText = "⏹ HENTIKAN SIMULASI";
                btnAction.classList.add('btn-stop');

            } catch (error) {
                alert("Gagal menjalankan. Pastikan kode HEX valid!\n" + error.message);
            }
        });
    </script>
</body>
</html>
