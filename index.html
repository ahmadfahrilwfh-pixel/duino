<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Embedded Simulator - Drag & Drop Wiring</title>
    <style>
        :root { --bg: #1e1e2e; --panel: #252538; --text: #cdd6f4; --accent: #74c7ec; --log-bg: #11111b; }
        body { font-family: 'Segoe UI', Tahoma, sans-serif; margin: 0; padding: 0; background: var(--bg); color: var(--text); display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
        
        /* Navbar & Panels */
        .navbar { background: var(--panel); padding: 10px 20px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #313244; z-index: 100;}
        .view-toggles button { background: #313244; color: var(--text); border: none; padding: 6px 12px; margin: 0 5px; border-radius: 4px; cursor: pointer; transition: 0.2s;}
        .view-toggles button.active { background: var(--accent); color: #11111b; font-weight: bold;}
        
        .main-container { display: flex; flex: 1; overflow: hidden; padding: 15px; gap: 15px; }
        .panel { background: var(--panel); border-radius: 8px; padding: 15px; display: flex; flex-direction: column; border: 1px solid #313244; flex: 1; transition: 0.3s; }
        
        #editor-container { flex: 3; border-radius: 6px; overflow: hidden; border: 1px solid #313244; margin-bottom: 10px; }
        #log-container { flex: 1; background: var(--log-bg); border-radius: 6px; border: 1px solid #313244; padding: 10px; font-family: monospace; font-size: 12px; color: #a6e3a1; overflow-y: auto; white-space: pre-wrap; display: flex; flex-direction: column;}
        
        .controls { display: flex; gap: 10px; margin-bottom: 15px; flex-wrap: wrap; }
        button { background: var(--accent); color: #11111b; border: none; padding: 8px 12px; border-radius: 4px; font-weight: bold; cursor: pointer; transition: 0.2s; font-size: 12px; }
        button:hover { opacity: 0.8; }
        .btn-save { background-color: #a6e3a1; }
        .btn-load { background-color: #f9e2af; }
        .btn-compile { background-color: #f38ba8; }
        
        /* Workbench & Asset Button */
        #workbench { flex: 1; background-color: #181825; border: 2px dashed #45475a; border-radius: 8px; position: relative; overflow: hidden; cursor: default; }
        
        .fab-container { position: absolute; top: 15px; right: 15px; display: flex; flex-direction: column; gap: 10px; z-index: 50;}
        .btn-floating { border-radius: 50%; width: 45px; height: 45px; font-size: 20px; padding: 0; box-shadow: 0 4px 10px rgba(0,0,0,0.5); background: #cba6f7; display:flex; justify-content:center; align-items:center; border: none; cursor:pointer;}
        .btn-floating.active { background: #a6e3a1; box-shadow: 0 0 15px #a6e3a1; }

        .draggable { position: absolute; cursor: grab; user-select: none; z-index: 10;}
        .draggable:active { cursor: grabbing; }

        /* Wiring Layer */
        #wiring-layer { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 5; }
        .wire { stroke: #89b4fa; stroke-width: 4; stroke-linecap: round; filter: drop-shadow(0px 2px 2px rgba(0,0,0,0.5)); transition: stroke 0.2s, filter 0.2s; }
        .wire.drawing { stroke: #f9e2af; stroke-dasharray: 5,5; opacity: 0.8;}
        .wire.high-voltage { stroke: #f38ba8 !important; filter: drop-shadow(0px 0px 8px #f38ba8) !important; }

        /* Modal Menu Asset */
        .modal-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); z-index: 200; justify-content: center; align-items: center; }
        .modal-content { background: var(--panel); border: 1px solid #313244; border-radius: 8px; width: 350px; max-height: 80vh; overflow-y: auto; box-shadow: 0 10px 30px rgba(0,0,0,0.8); }
        .modal-header { padding: 15px; border-bottom: 1px solid #313244; display: flex; justify-content: space-between; align-items: center; font-weight: bold;}
        .close-modal { background: none; border: none; color: #f38ba8; font-size: 20px; cursor: pointer; padding: 0;}
        .asset-list { list-style: none; padding: 0; margin: 0; }
        .asset-item { padding: 15px; border-bottom: 1px solid #313244; display: flex; align-items: center; gap: 15px; cursor: pointer; transition: 0.2s; }
        .asset-item:hover { background: #313244; }
        
    </style>
    
    <script type="module" src="https://esm.run/@wokwi/elements"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/monaco-editor/0.44.0/min/vs/loader.min.js"></script>
</head>
<body>

    <div class="navbar">
        <h3 style="margin: 0; color: #cba6f7;">Embedded IDE - Drag & Drop System</h3>
        <div class="view-toggles">
            <button id="view-code">Code Only</button>
            <button id="view-split" class="active">Split View</button>
            <button id="view-sim">Sim Only</button>
        </div>
    </div>

    <div class="main-container">
        <div class="panel" id="panel-code">
            <div class="controls">
                <button id="btn-save" class="btn-save">💾 SIMPAN</button>
                <button id="btn-load" class="btn-load">📂 MUAT</button>
                <button id="btn-compile" class="btn-compile">▶ KOMPILASI & JALANKAN</button>
            </div>
            <div id="editor-container"></div>
            <div id="log-container">
                <span style="color: #cdd6f4;">[System] IDE Siap. Sistem Drag-to-Connect Kabel telah aktif.</span>
            </div>
        </div>

        <div class="panel" id="panel-sim">
            <div id="workbench">
                <svg id="wiring-layer"></svg>

                <div class="fab-container">
                    <button class="btn-floating" id="btn-add-asset" title="Tambah Komponen">➕</button>
                    <button class="btn-floating" id="btn-wire-mode" title="Mode Kabel Aktif/Nonaktif">🔌</button>
                </div>
                
                <wokwi-arduino-uno id="uno-board" class="draggable" style="top: 50px; left: 50px;"></wokwi-arduino-uno>
            </div>
        </div>
    </div>

    <div class="modal-overlay" id="asset-modal">
        <div class="modal-content">
            <div class="modal-header">
                <span>Tambah Komponen</span>
                <button class="close-modal" id="close-modal">&times;</button>
            </div>
            <ul class="asset-list">
                <li class="asset-item" onclick="addComponent('wokwi-led', {color: 'red', style: 'width:30px;'})">
                    <wokwi-led color="red" style="width:30px;"></wokwi-led> <span>LED Merah</span>
                </li>
                <li class="asset-item" onclick="addComponent('wokwi-lcd1602', {style: 'width:180px;'})">
                    <wokwi-lcd1602 style="width:100px;"></wokwi-lcd1602> <span>LCD 16x2</span>
                </li>
                <li class="asset-item" onclick="addComponent('wokwi-analog-joystick', {style: 'width:80px;'})">
                    <wokwi-analog-joystick style="width:50px;"></wokwi-analog-joystick> <span>Joystick</span>
                </li>
                <li class="asset-item" onclick="addComponent('wokwi-servo', {style: 'width:80px;'})">
                    <wokwi-servo style="width:50px;"></wokwi-servo> <span>Servo</span>
                </li>
                <li class="asset-item" onclick="addComponent('wokwi-resistor', {value: 220, style: 'width:50px;'})">
                    <wokwi-resistor style="width:50px;"></wokwi-resistor> <span>Resistor</span>
                </li>
            </ul>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getFirestore, doc, setDoc, getDoc } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";
        import { CPU, AVRIOPort, portBConfig, portDConfig } from 'https://esm.run/avr8js';

        // Firebase Config (Silakan Sesuaikan)
        const firebaseConfig = {
            apiKey: "AIzaSyBmZR9PeOQIdHBwV5USTxU3_41KfIbw9tQ",
            authDomain: "kwtabiyoso.firebaseapp.com",
            databaseURL: "https://kwtabiyoso-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "kwtabiyoso"
        };
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const docRef = doc(db, "projects", "sim_user_01"); 

        const logContainer = document.getElementById('log-container');
        function addLog(message, isError = false) {
            const span = document.createElement('span');
            span.style.color = isError ? '#f38ba8' : '#a6e3a1';
            span.innerText = `> ${message}`;
            logContainer.appendChild(span);
            logContainer.scrollTop = logContainer.scrollHeight;
        }

        // ==========================================
        // INISIALISASI MONACO EDITOR
        // ==========================================
        let monacoEditorInstance = null;
        const defaultCode = `#include <LiquidCrystal.h>\n\nvoid setup() {\n  pinMode(13, OUTPUT);\n}\n\nvoid loop() {\n  digitalWrite(13, HIGH);\n  delay(500);\n  digitalWrite(13, LOW);\n  delay(500);\n}`;

        require.config({ paths: { 'vs': 'https://cdnjs.cloudflare.com/ajax/libs/monaco-editor/0.44.0/min/vs' }});
        require(['vs/editor/editor.main'], function() {
            monacoEditorInstance = monaco.editor.create(document.getElementById('editor-container'), {
                value: defaultCode, language: 'cpp', theme: 'vs-dark', automaticLayout: true, minimap: { enabled: false }
            });
        });

        // VIEW TOGGLE LOGIC
        const pnlCode = document.getElementById('panel-code');
        const pnlSim = document.getElementById('panel-sim');
        document.getElementById('view-code').onclick = (e) => setView('code', e.target);
        document.getElementById('view-split').onclick = (e) => setView('split', e.target);
        document.getElementById('view-sim').onclick = (e) => setView('sim', e.target);

        function setView(mode, btn) {
            document.querySelectorAll('.view-toggles button').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            if(mode === 'code') { pnlCode.style.display = 'flex'; pnlSim.style.display = 'none'; }
            else if(mode === 'sim') { pnlCode.style.display = 'none'; pnlSim.style.display = 'flex'; }
            else { pnlCode.style.display = 'flex'; pnlSim.style.display = 'flex'; }
        }

        // ==========================================
        // SISTEM DRAG & DROP WIRING PROFESSIONAL
        // ==========================================
        const workbench = document.getElementById('workbench');
        const wiringLayer = document.getElementById('wiring-layer');
        const btnWireMode = document.getElementById('btn-wire-mode');
        
        let isWiringMode = false;
        let drawingWire = null; 
        const simulationState = { wires: [] };
        let wireCounter = 0;

        btnWireMode.addEventListener('click', () => {
            isWiringMode = !isWiringMode;
            btnWireMode.classList.toggle('active', isWiringMode);
            workbench.style.cursor = isWiringMode ? 'crosshair' : 'default';
            addLog(isWiringMode ? "MODE KABEL AKTIF: Klik dan tahan pada pin, lalu tarik ke komponen lain." : "MODE KABEL NON-AKTIF: Anda bebas menggeser komponen.");
        });

        // Tembus Shadow DOM untuk mencari ID Pin di SVG
        function getPinNameFromPath(path) {
            for (let node of path) {
                if (node.id && node.id.length > 0 && !node.id.startsWith('comp-') && node.id !== 'uno-board') {
                    return node.id.replace('pin-', ''); // Membersihkan prefix 'pin-' jika ada
                }
            }
            return "Pin-Unknown";
        }

        function attachComponentEvents(elmnt) {
            elmnt.addEventListener('mousedown', (e) => {
                if (isWiringMode) {
                    e.stopPropagation();
                    e.preventDefault(); 

                    const rect = elmnt.getBoundingClientRect();
                    const workbenchRect = workbench.getBoundingClientRect();
                    
                    // Offset relatif klik terhadap posisi elemen komponen
                    const offsetX = e.clientX - rect.left;
                    const offsetY = e.clientY - rect.top;

                    // Mengambil nama pin aktual dari Wokwi SVG
                    const pinName = getPinNameFromPath(e.composedPath());

                    // Memulai garis (draw)
                    const activeSVGLine = document.createElementNS('http://www.w3.org/2000/svg', 'line');
                    activeSVGLine.classList.add('wire', 'drawing');
                    
                    const startX = e.clientX - workbenchRect.left;
                    const startY = e.clientY - workbenchRect.top;
                    
                    activeSVGLine.setAttribute('x1', startX);
                    activeSVGLine.setAttribute('y1', startY);
                    activeSVGLine.setAttribute('x2', startX);
                    activeSVGLine.setAttribute('y2', startY);
                    wiringLayer.appendChild(activeSVGLine);

                    drawingWire = {
                        svgElement: activeSVGLine,
                        fromComp: elmnt,
                        fromPin: pinName,
                        fromOffsetX: offsetX,
                        fromOffsetY: offsetY
                    };
                } else {
                    dragMouseDown(e, elmnt);
                }
            });
        }

        // Meneruskan garis saat mouse ditarik (Drag Line)
        window.addEventListener('mousemove', (e) => {
            if (drawingWire) {
                const workbenchRect = workbench.getBoundingClientRect();
                let x = e.clientX - workbenchRect.left;
                let y = e.clientY - workbenchRect.top;
                drawingWire.svgElement.setAttribute('x2', x);
                drawingWire.svgElement.setAttribute('y2', y);
            }
        });

        // Melepas klik untuk menyelesaikan sambungan kabel (Drop Line)
        window.addEventListener('mouseup', (e) => {
            if (drawingWire) {
                const path = e.composedPath();
                let targetComp = null;
                let targetPin = null;

                for (let node of path) {
                    if (node.classList && node.classList.contains('draggable')) {
                        targetComp = node;
                    }
                }

                if (targetComp && targetComp !== drawingWire.fromComp) {
                    // Berhasil mendarat di komponen berbeda
                    targetPin = getPinNameFromPath(path);
                    
                    const rect = targetComp.getBoundingClientRect();
                    const toOffsetX = e.clientX - rect.left;
                    const toOffsetY = e.clientY - rect.top;

                    drawingWire.svgElement.classList.remove('drawing');
                    
                    // Simpan mapping Netlist
                    simulationState.wires.push({
                        id: `wire-${wireCounter++}`,
                        fromComp: drawingWire.fromComp,
                        fromPin: drawingWire.fromPin,
                        fromOffsetX: drawingWire.fromOffsetX,
                        fromOffsetY: drawingWire.fromOffsetY,
                        toComp: targetComp,
                        toPin: targetPin,
                        toOffsetX: toOffsetX,
                        toOffsetY: toOffsetY,
                        svgElement: drawingWire.svgElement
                    });

                    addLog(`[Berhasil] ${drawingWire.fromComp.tagName} (Pin ${drawingWire.fromPin}) terhubung ke ${targetComp.tagName} (Pin ${targetPin})`);
                } else {
                    // Batal (lepas di ruang kosong atau di komponen yang sama)
                    wiringLayer.removeChild(drawingWire.svgElement);
                    addLog(`Kabel batal disambung.`);
                }
                
                drawingWire = null;
            }
        });

        // Update titik kabel ketika komponen digeser
        function updateConnectedWires() {
            simulationState.wires.forEach(wire => {
                // Menghitung ulang titik absolut di dalam workbench berdasarkan posisi komponen + relative offset klik
                const fromX = wire.fromComp.offsetLeft + wire.fromOffsetX;
                const fromY = wire.fromComp.offsetTop + wire.fromOffsetY;
                const toX = wire.toComp.offsetLeft + wire.toOffsetX;
                const toY = wire.toComp.offsetTop + wire.toOffsetY;

                wire.svgElement.setAttribute('x1', fromX);
                wire.svgElement.setAttribute('y1', fromY);
                wire.svgElement.setAttribute('x2', toX);
                wire.svgElement.setAttribute('y2', toY);
            });
        }

        function dragMouseDown(e, elmnt) {
            e.preventDefault();
            let pos3 = e.clientX, pos4 = e.clientY;
            document.onmouseup = () => { document.onmouseup = null; document.onmousemove = null; };
            document.onmousemove = (ev) => {
                ev.preventDefault();
                let pos1 = pos3 - ev.clientX;
                let pos2 = pos4 - ev.clientY;
                pos3 = ev.clientX;
                pos4 = ev.clientY;
                elmnt.style.top = (elmnt.offsetTop - pos2) + "px";
                elmnt.style.left = (elmnt.offsetLeft - pos1) + "px";
                updateConnectedWires(); // Kabel auto-adjust saat komponen digeser
            };
            document.querySelectorAll('.draggable').forEach(el => el.style.zIndex = "10");
            elmnt.style.zIndex = "20"; 
        }

        // Modal Add Asset
        const modal = document.getElementById('asset-modal');
        document.getElementById('btn-add-asset').onclick = () => modal.style.display = 'flex';
        document.getElementById('close-modal').onclick = () => modal.style.display = 'none';
        let compCounter = 0;

        window.addComponent = function(type, attributes = {}) {
            const newElement = document.createElement(type);
            newElement.classList.add('draggable');
            newElement.id = `comp-${compCounter++}`;
            newElement.style.top = '100px';
            newElement.style.left = '100px';
            
            for (const [key, value] of Object.entries(attributes)) {
                newElement.setAttribute(key, value);
            }
            
            workbench.appendChild(newElement);
            attachComponentEvents(newElement); 
            modal.style.display = 'none';
        };

        attachComponentEvents(document.getElementById('uno-board'));

        // ==========================================
        // KOMPILASI C++ KE HEX & JALANKAN AVR8JS
        // ==========================================
        const btnCompile = document.getElementById('btn-compile');
        let runnerInterval = null;

        function parseHex(hex) {
            const data = new Uint8Array(32768);
            const lines = hex.split('\n');
            for (const line of lines) {
                if (line.startsWith(':')) {
                    const length = parseInt(line.substring(1, 3), 16);
                    const address = parseInt(line.substring(3, 7), 16);
                    const recordType = parseInt(line.substring(7, 9), 16);
                    if (recordType === 0) {
                        for (let i = 0; i < length; i++) { data[address + i] = parseInt(line.substring(9 + i * 2, 11), 16); }
                    }
                }
            }
            return data;
        }

        function triggerPinState(pinNumber, isHigh) {
            simulationState.wires.forEach(wire => {
                if (wire.fromComp.id === 'uno-board' && wire.fromPin === pinNumber.toString()) {
                    // Animasi kabel dialiri listrik
                    if (isHigh) wire.svgElement.classList.add('high-voltage');
                    else wire.svgElement.classList.remove('high-voltage');

                    // Mengirim nilai (value) ke komponen penerima
                    if (wire.toComp.tagName.toLowerCase() === 'wokwi-led') {
                        wire.toComp.value = isHigh;
                    }
                }
            });
        }

        btnCompile.addEventListener('click', async () => {
            if (!monacoEditorInstance) return;
            
            if (runnerInterval) {
                clearInterval(runnerInterval);
                runnerInterval = null;
                document.getElementById('uno-board').led13 = false;
                simulationState.wires.forEach(w => w.svgElement.classList.remove('high-voltage'));
                addLog("Simulasi dihentikan.");
                btnCompile.innerText = "▶ KOMPILASI & JALANKAN";
                btnCompile.style.backgroundColor = "#f38ba8";
                return;
            }

            const code = monacoEditorInstance.getValue();
            addLog("Mengirim C++ ke API Compiler Wokwi...");
            
            const buildPayload = { 
                board: 'uno',
                sketch: 'sketch.ino',
                files: { "sketch.ino": code }
            };
            
            try {
                const response = await fetch('https://hexi.wokwi.com/build', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(buildPayload)
                });
                
                const result = await response.json();
                if (result.stderr) { addLog("COMPILER ERROR:\n" + result.stderr, true); return; }

                addLog(`Kompilasi sukses! Memulai mesin AVR8JS...`);

                const program = new Uint16Array(32768);
                const programBytes = new Uint8Array(program.buffer);
                programBytes.set(parseHex(result.hex));
                
                const cpu = new CPU(program);
                const portB = new AVRIOPort(cpu, portBConfig); 
                const portD = new AVRIOPort(cpu, portDConfig); 
                
                portB.addListener((value) => {
                    const pin13High = (value & (1 << 5)) !== 0; // Bit ke 5 di Port B adalah Pin 13
                    document.getElementById('uno-board').led13 = pin13High;
                    triggerPinState(13, pin13High); 
                });

                runnerInterval = setInterval(() => {
                    const cyclesToRun = cpu.cycles + 16000000 / 60; 
                    while (cpu.cycles < cyclesToRun) { cpu.tick(); }
                }, 16);

                btnCompile.innerText = "⏹ HENTIKAN SIMULASI";
                btnCompile.style.backgroundColor = "#eba0ac";
                addLog("Simulasi Berjalan!");

            } catch (error) {
                addLog("Gagal menghubungi server kompilator: " + error.message, true);
            }
        });
    </script>
</body>
</html>
